<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORCHEGENTRA AI</title>
  <style>
    :root{
      --bg:#040814;
      --bg2:#091224;
      --panel:rgba(10,18,38,.86);
      --panel2:rgba(13,22,44,.94);
      --line:rgba(115,149,255,.18);
      --line2:rgba(115,149,255,.34);
      --text:#eef4ff;
      --muted:#98add9;

      --chairman:#ffd76e;
      --cto:#7fb0ff;
      --cmo:#ff8ad8;
      --hr:#72e9ff;
      --ds:#b894ff;
      --de:#5ef0b2;
      --ml:#9a7cff;
      --builder:#ffb063;
      --automation:#6dff97;
      --qa:#f4f7ff;
      --operations:#ffc96a;
      --security:#ff7b8b;
      --summary:#cfd8ea;

      --blue:#5a7cff;
      --cyan:#28d7ff;
      --purple:#8f5cff;
      --green:#28d77a;
      --orange:#ff9d3d;
      --pink:#ff5db1;
      --red:#ff5c6a;
      --gold:#d9a628;
      --shadow:0 18px 45px rgba(0,0,0,.38);
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%}

    body{
      font-family:Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(40,215,255,.11), transparent 18%),
        radial-gradient(circle at 83% 10%, rgba(143,92,255,.12), transparent 20%),
        radial-gradient(circle at 50% 90%, rgba(40,215,122,.10), transparent 25%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.16;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size:28px 28px;
    }

    .app{
      display:grid;
      grid-template-columns:270px 1fr 430px;
      min-height:100vh;
    }

    .sidebar{
      background:rgba(6,10,22,.95);
      border-right:1px solid var(--line);
      padding:18px;
      position:sticky;
      top:0;
      height:100vh;
    }

    .brand{
      background:linear-gradient(135deg, rgba(90,124,255,.18), rgba(40,215,255,.08), rgba(143,92,255,.12));
      border:1px solid var(--line2);
      border-radius:20px;
      padding:18px;
      box-shadow:0 0 28px rgba(90,124,255,.13);
    }

    .brand-title{
      font-size:28px;
      font-weight:900;
      letter-spacing:.6px;
    }

    .brand-sub{
      margin-top:6px;
      font-size:11px;
      letter-spacing:2.5px;
      color:var(--muted);
    }

    .nav{
      margin-top:18px;
      display:grid;
      gap:10px;
    }

    .nav button{
      width:100%;
      padding:13px 14px;
      border:none;
      border-radius:14px;
      background:#0f1a3a;
      color:white;
      cursor:pointer;
      border:1px solid #223a72;
      font-weight:800;
      text-align:left;
      transition:.2s;
    }

    .nav button:hover{
      transform:translateY(-1px);
      box-shadow:0 0 20px rgba(90,124,255,.18);
    }

    .nav button.active{
      border-color:#5473ca;
      box-shadow:0 0 24px rgba(90,124,255,.35);
    }

    .nav button.home.active{ background:linear-gradient(90deg, rgba(40,215,255,.22), rgba(40,215,255,.05)); }
    .nav button.command.active{ background:linear-gradient(90deg, rgba(90,124,255,.24), rgba(90,124,255,.05)); }
    .nav button.agents.active{ background:linear-gradient(90deg, rgba(143,92,255,.24), rgba(143,92,255,.05)); }
    .nav button.workspace.active{ background:linear-gradient(90deg, rgba(40,215,122,.22), rgba(40,215,122,.05)); }
    .nav button.ongoing.active{ background:linear-gradient(90deg, rgba(255,157,61,.22), rgba(255,157,61,.05)); }
    .nav button.completed.active{ background:linear-gradient(90deg, rgba(255,93,177,.22), rgba(255,93,177,.05)); }
    .nav button.output.active{ background:linear-gradient(90deg, rgba(217,166,40,.22), rgba(217,166,40,.05)); }
    .nav button.files.active{ background:linear-gradient(90deg, rgba(114,233,255,.22), rgba(114,233,255,.05)); }
    .nav button.settings.active{ background:linear-gradient(90deg, rgba(255,255,255,.14), rgba(255,255,255,.03)); }

    .side-box{
      margin-top:18px;
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:12px;
      line-height:1.6;
    }

    .main{
      padding:18px;
    }

    .topbar{
      background:rgba(10,18,38,.88);
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px

    display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:center;
      box-shadow:var(--shadow);
    }

    .topbar h1{
      margin:0;
      font-size:24px;
    }

    .topbar p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:12px;
    }

    .topbar-tags{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .tag{
      padding:8px 11px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      font-size:12px;
      color:var(--muted);
    }

    .page{
      display:none;
      margin-top:16px;
    }

    .page.active{
      display:block;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }

    .hero{
      background:linear-gradient(135deg, rgba(90,124,255,.16), rgba(40,215,255,.08), rgba(143,92,255,.08));
      border:1px solid var(--line2);
    }

    .panel h2{
      margin:0 0 10px;
      font-size:22px;
    }

    .muted{
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
    }

    .kpis{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

    .kpi{
      background:var(--panel2);
      border:1px solid #233764;
      border-radius:18px;
      padding:14px;
    }

    .kpi .value{
      margin-top:8px;
      font-size:30px;
      font-weight:900;
    }

    .input,.textarea,.btn,.file-input{
      width:100%;
      padding:13px;
      border-radius:12px;
      border:none;
      margin-top:10px;
    }

    .input,.textarea,.file-input{
      background:#0c152f;
      color:var(--text);
      border:1px solid #2a3f77;
    }

    .textarea{
      min-height:120px;
    }

    .btn{
      cursor:pointer;
      color:white;
      font-weight:800;
      background:linear-gradient(90deg,var(--blue),var(--purple));
    }

    .task-card{
      background:#0f1a3a;
      border:1px solid #223a72;
      padding:14px;
      border-radius:16px;
      margin-top:12px;
    }

    .chips{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .chip{
      padding:5px 9px;
      border-radius:14px;
      font-size:11px;
      border:1px solid;
    }

    .chairman{color:var(--chairman);border-color:var(--chairman)}
    .cto{color:var(--cto);border-color:var(--cto)}
    .builder{color:var(--builder);border-color:var(--builder)}
    .automation{color:var(--automation);border-color:var(--automation)}
    .qa{color:var(--qa);border-color:var(--qa)}

  </style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="brand">
      <div class="brand-title">ORCHEGENTRA</div>
      <div class="brand-sub">AI OS</div>
    </div>

    <div class="nav">
      <button onclick="showPage('home')">Home</button>
      <button onclick="showPage('command')">Command</button>
      <button onclick="showPage('agents')">Agents</button>
      <button onclick="showPage('workspace')">Workspace</button>
      <button onclick="showPage('ongoing')">Ongoing</button>
      <button onclick="showPage('completed')">Completed</button>
      <button onclick="showPage('output')">Output</button>
      <button onclick="showPage('files')">Files</button>
      <button onclick="showPage('settings')">Settings</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h1>AI Command Center</h1>
    </div>

    <!-- HOME -->
    <div id="home" class="page active panel">
      <h2>Home</h2>
      <p class="muted">Welcome to ORCHEGENTRA AI</p>
    </div>

    <!-- COMMAND -->
    <div id="command" class="page panel">
      <h2>Create Task</h2>
      <input id="title" class="input" placeholder="Title">
      <textarea id="desc" class="textarea" placeholder="Description"></textarea>
      <button class="btn" onclick="createTask()">Create</button>
    </div>

    <!-- ONGOING -->
    <div id="ongoing" class="page panel">
      <h2>Ongoing Tasks</h2>
      <div id="taskList"></div>
    </div>

    <!-- OUTPUT -->
    <div id="output" class="page panel">
      <h2>Output</h2>
      <div id="outputBox">No output yet</div>
    </div>

  </div>
</div>

<script>

let tasks = []

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
  document.getElementById(id).classList.add("active")
}

function createTask(){
  const title = document.getElementById("title").value
  const desc = document.getElementById("desc").value

  const task = {
    id: Date.now(),
    title,
    desc
  }

  tasks.push(task)
  renderTasks()
}

function renderTasks(){
  const list = document.getElementById("taskList")
  list.innerHTML = tasks.map(t=>`
    <div class="task-card">
      <b>${t.title}</b>
      <p>${t.desc}</p>
      <div class="chips">
        <span class="chip chairman">Chairman</span>
        <span class="chip cto">CTO</span>
        <span class="chip builder">Builder</span>
        <span class="chip automation">Automation</span>
        <span class="chip qa">QA</span>
      </div>
      <button onclick="runTask(${t.id})">Run</button>
    </div>
  `).join("")
}

function runTask(id){
  document.getElementById("outputBox").innerText =
    "Multi-agent execution completed for task " + id
}

</script>

</body>
</html>
