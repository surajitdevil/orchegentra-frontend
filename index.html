<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORCHEGENTRA AI</title>
  <style>
    :root{
      --bg:#040814;
      --bg2:#091224;
      --panel:rgba(10,18,38,.86);
      --panel2:rgba(13,22,44,.94);
      --line:rgba(115,149,255,.18);
      --line2:rgba(115,149,255,.34);
      --text:#eef4ff;
      --muted:#98add9;

      --chairman:#ffd76e;
      --cto:#7fb0ff;
      --cmo:#ff8ad8;
      --hr:#72e9ff;
      --ds:#b894ff;
      --de:#5ef0b2;
      --ml:#9a7cff;
      --builder:#ffb063;
      --automation:#6dff97;
      --qa:#f4f7ff;
      --operations:#ffc96a;
      --security:#ff7b8b;
      --summary:#cfd8ea;

      --blue:#5a7cff;
      --cyan:#28d7ff;
      --purple:#8f5cff;
      --green:#28d77a;
      --orange:#ff9d3d;
      --pink:#ff5db1;
      --red:#ff5c6a;
      --gold:#d9a628;
      --shadow:0 18px 45px rgba(0,0,0,.38);
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%}
    body{
      font-family:Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(40,215,255,.11), transparent 18%),
        radial-gradient(circle at 83% 10%, rgba(143,92,255

                                                radial-gradient(circle at 83% 10%, rgba(143,92,255,.12), transparent 20%),
        radial-gradient(circle at 50% 90%, rgba(40,215,122,.10), transparent 25%),
        linear-gradient(180deg,var(--bg),var(--bg2));
    }

    .app{
      display:grid;
      grid-template-columns:260px 1fr 360px;
      min-height:100vh;
    }

    /* SIDEBAR */
    .sidebar{
      background:rgba(6,10,22,.95);
      border-right:1px solid var(--line);
      padding:18px;
    }

    .logo{
      font-size:26px;
      font-weight:900;
      letter-spacing:1px;
      margin-bottom:20px;
      color:var(--cyan);
      text-shadow:0 0 18px rgba(40,215,255,.6);
    }

    .nav button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:12px;
      background:#0f1a3a;
      color:white;
      cursor:pointer;
      border:1px solid #223a72;
      font-weight:700;
      transition:.2s;
    }

    .nav button:hover{
      transform:translateY(-2px);
      box-shadow:0 0 20px rgba(90,124,255,.3);
    }

    .nav button.active{
      background:linear-gradient(90deg,var(--blue),var(--purple));
      box-shadow:0 0 25px rgba(90,124,255,.6);
    }

    /* MAIN */
    .main{
      padding:20px;
    }

    .page{display:none}
    .page.active{display:block}

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }

    /* INPUT */
    input,textarea{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #2a3f77;
      background:#0c152f;
      color:white;
      margin-top:10px;
    }

    button.main-btn{
      margin-top:12px;
      padding:12px;
      width:100%;
      border:none;
      border-radius:10px;
      font-weight:800;
      cursor:pointer;
      background:linear-gradient(90deg,var(--blue),var(--purple));
    }

    /* TASK CARD */
    .task{
      background:#0f1a3a;
      border:1px solid #223a72;
      padding:14px;
      border-radius:14px;
      margin-top:12px;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-top:10px;
    }

    .chip{
      padding:6px 10px;
      border-radius:20px;
      font-size:11px;
      font-weight:700;
      border:1px solid;
    }

    /* AGENT COLORS */
    .chairman{color:var(--chairman);border-color:var(--chairman);box-shadow:0 0 10px var(--chairman)}
    .cto{color:var(--cto);border-color:var(--cto);box-shadow:0 0 10px var(--cto)}
    .cmo{color:var(--cmo);border-color:var(--cmo);box-shadow:0 0 10px var(--cmo)}
    .hr{color:var(--hr);border-color:var(--hr);box-shadow:0 0 10px var(--hr)}
    .builder{color:var(--builder);border-color:var(--builder);box-shadow:0 0 10px var(--builder)}
    .automation{color:var(--automation);border-color:var(--automation);box-shadow:0 0 10px var(--automation)}
    .qa{color:var(--qa);border-color:var(--qa);box-shadow:0 0 10px var(--qa)}

    /* RIGHT PANEL */
    .right{
      padding:20px;
    }

    .output{
      background:var(--panel2);
      border-radius:16px;
      padding:16px;
      height:100%;
      overflow:auto;
    }

  </style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">ORCHEGENTRA</div>

  <div class="nav">
    <button class="active" onclick="showPage('home',this)">Home</button>
    <button onclick="showPage('command',this)">Command Center</button>
    <button onclick="showPage('agents',this)">Agents</button>
    <button onclick="showPage('workspace',this)">Workspace</button>
    <button onclick="showPage('ongoing',this)">Ongoing</button>
    <button onclick="showPage('completed',this)">Completed</button>
    <button onclick="showPage('output',this)">Output</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<div id="home" class="page active panel">
  <h2>🚀 ORCHEGENTRA AI</h2>
  <p>Next-gen Agentic AI Company OS</p>
</div>

<div id="command" class="page panel">
  <h2>Create Task</h2>
  <input id="title" placeholder="Task title">
  <textarea id="desc" placeholder="Task description"></textarea>
  <input type="file" id="files" multiple>
  <button class="main-btn" onclick="createTask()">Create Task</button>
</div>

<div id="agents" class="page panel">
  <h2>Agents</h2>
  <div class="chips">
    <div class="chip chairman">Chairman</div>
    <div class="chip cto">CTO</div>
    <div class="chip cmo">CMO</div>
    <div class="chip hr">HR</div>
    <div class="chip builder">Builder</div>
    <div class="chip automation">Automation</div>
    <div class="chip qa">QA</div>
  </div>
</div>

<div id="workspace" class="page panel">
  <h2>Workspace</h2>
  <div id="workspaceBox">Select task</div>
</div>

<div id="ongoing" class="page panel">
  <h2>Ongoing Tasks</h2>
  <div id="ongoingList"></div>
</div>

<div id="completed" class="page panel">
  <h2>Completed Tasks</h2>
  <button onclick="clearCompleted()">Clear Completed</button>
  <div id="completedList"></div>
</div>

<div id="output" class="page panel">
  <h2>Output</h2>
  <div id="outputBox">No output yet</div>
</div>

</div>

<!-- RIGHT OUTPUT PANEL -->
<div class="right">
  <div class="output" id="liveOutput">
    <h3>Live Agent Output</h3>
    Waiting...
  </div>
</div>

</div>

<script>

let tasks=[]
let selected=null

function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  document.getElementById(id).classList.add('active')

  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'))
  btn.classList.add('active')
}

function createTask(){
  const title=document.getElementById('title').value
  const desc=document.getElementById('desc').value

  const task={
    id:Date.now(),
    title,
    desc,
    status:'ongoing'
  }

  tasks.push(task)
  renderTasks()
}

function renderTasks(){
  const ongoing=document.getElementById('ongoingList')
  const completed=document.getElementById('completedList')

  ongoing.innerHTML=''
  completed.innerHTML=''

  tasks.forEach(t=>{
    const el=document.createElement('div')
    el.className='task'

    el.innerHTML=`
      <b>${t.title}</b>
      <p>${t.desc}</p>

      <div class="chips">
        <div class="chip chairman">Chairman</div>
        <div class="chip cto">CTO</div>
        <div class="chip builder">Builder</div>
        <div class="chip automation">Automation</div>
        <div class="chip qa">QA</div>
      </div>

      <button onclick="selectTask(${t.id})">Open</button>
      <button onclick="completeTask(${t.id})">Complete</button>
      <button onclick="deleteTask(${t.id})">Delete</button>
    `

    if(t.status==='ongoing') ongoing.appendChild(el)
    else completed.appendChild(el)
  })
}

function selectTask(id){
  selected=tasks.find(t=>t.id===id)
  document.getElementById('workspaceBox').innerText=selected.title

  // fake agent output
  document.getElementById('liveOutput').innerText=
`Chairman → Strategy defined
CTO → Architecture planned
Builder → System design ready
Automation → Flow created
QA → Testing passed`
}

function completeTask(id){
  const t=tasks.find(x=>x.id===id)
  t.status='completed'
  renderTasks()
}

function deleteTask(id){
  tasks=tasks.filter(t=>t.id!==id)
  renderTasks()
}

function clearCompleted(){
  tasks=tasks.filter(t=>t.status!=='completed')
  renderTasks()
}

</script>

</body>
</html>
