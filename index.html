<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orchegentra AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1020;
  color: white;
}

.header {
  padding: 16px;
  text-align: center;
  background: linear-gradient(90deg, #141b34, #1d2957);
  font-weight: bold;
  font-size: 20px;
}

.subheader {
  text-align: center;
  font-size: 12px;
  color: #9bb0d9;
  margin-top: 4px;
  margin-bottom: 8px;
}

.container {
  padding: 15px;
}

.card {
  background: #141b34;
  padding: 15px;
  border-radius: 14px;
  margin-bottom: 15px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.2);
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.kpi {
  background: #0e1530;
  padding: 14px;
  border-radius: 12px;
  text-align: center;
}

.kpi-label {
  font-size: 12px;
  color: #9bb0d9;
}

.kpi-value {
  font-size: 24px;
  font-weight: bold;
  margin-top: 8px;
}

input, textarea, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  box-sizing: border-box;
}

textarea {
  min-height: 110px;
  resize: vertical;
}

button {
  background: #5a7cff;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button.secondary {
  background: #2a355f;
}

button.green {
  background: #2e8b57;
}

.tabbar {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.tab-btn {
  flex: 1;
}

.task {
  background: #0e1530;
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
  border: 1px solid #1c2850;
}

.task-title {
  font-weight: bold;
  font-size: 16px;
}

.status {
  font-size: 12px;
  color: #9bb0d9;
  margin-top: 6px;
}

.badges {
  margin-top: 8px;
  line-height: 1.8;
}

.badge {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 999px;
  background: #1f2b56;
  color: #cbd7ff;
  font-size: 11px;
  margin-right: 6px;
  margin-top: 6px;
}

.viewer-title {
  font-size: 15px;
  font-weight: bold;
  margin-bottom: 8px;
}

.viewer-box {
  margin-top: 10px;
  background: #000;
  padding: 10px;
  border-radius: 10px;
  max-height: 420px;
  overflow: auto;
}

.viewer-box pre {
  white-space: pre-wrap;
  font-size: 12px;
  margin: 0;
}

.section-card {
  margin-top: 10px;
  background: #0e1530;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #1c2850;
}

.section-title {
  font-weight: bold;
  font-size: 13px;
  margin-bottom: 6px;
  color: #8ab4ff;
}

.empty {
  color: #9bb0d9;
  font-size: 13px;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

@media (max-width: 700px) {
  .grid, .two-col {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="header">ORCHEGENTRA AI</div>
<div class="subheader">Structured Multi-Agent Workspace</div>

<div class="container">

  <div class="card">
    <div class="grid">
      <div class="kpi">
        <div class="kpi-label">Total Tasks</div>
        <div class="kpi-value" id="totalTasks">0</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Ongoing</div>
        <div class="kpi-value" id="ongoingTasks">0</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Completed</div>
        <div class="kpi-value" id="completedTasks">0</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Latest</div>
        <div class="kpi-value" id="latestTask">-</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>Create Task</h3>
    <input id="title" placeholder="Task Title">
    <textarea id="desc" placeholder="Task Description"></textarea>
    <button onclick="createTask()">Create Task</button>
  </div>

  <div class="card">
    <div class="tabbar">
      <button class="tab-btn" onclick="setTab('ongoing')">Ongoing</button>
      <button class="tab-btn secondary" onclick="setTab('completed')">Completed</button>
    </div>
  </div>

  <div class="two-col">
    <div class="card">
      <h3 id="listTitle">Ongoing Tasks</h3>
      <button class="secondary" onclick="loadTasks()">Refresh</button>
      <div id="tasks"></div>
    </div>

    <div class="card">
      <h3>Task Detail Viewer</h3>
      <div id="selectedTaskViewer" class="empty">Select a task to view structured department outputs.</div>
    </div>
  </div>

</div>

<script>
const BACKEND = "https://adventurous-art-production.up.railway.app";
let latestTasks = [];
let currentTab = "ongoing";

function setTab(tab) {
  currentTab = tab;
  document.getElementById("listTitle").innerText = tab === "completed" ? "Completed Tasks" : "Ongoing Tasks";
  renderTaskList();
}

async function createTask() {
  try {
    const title = document.getElementById("title").value;
    const description = document.getElementById("desc").value;

    const res = await fetch(BACKEND + "/api/tasks/create", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        title: title,
        description: description
      })
    });

    const data = await res.json();

    if (!res.ok || data.ok === false) {
      alert(data.error || "Task creation failed");
      return;
    }

    alert("Task Created ✅");
    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
    loadTasks();
  } catch (err) {
    alert("Error: " + err.message);
  }
}

async function loadTasks() {
  try {
    const res = await fetch(BACKEND + "/api/tasks");
    const data = await res.json();

    latestTasks = (data.data || []).sort(function(a, b) {
      return new Date(b.created_at) - new Date(a.created_at);
    });

    updateDashboard(latestTasks);
    renderTaskList();

    if (latestTasks.length > 0) {
      showTaskOutput(latestTasks[0].id);
    }
  } catch (err) {
    alert("Load Error: " + err.message);
  }
}

function renderTaskList() {
  const container = document.getElementById("tasks");
  container.innerHTML = "";

  const filtered = latestTasks.filter(function(task) {
    if (currentTab === "completed") return task.status === "completed";
    return task.status !== "completed";
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">No tasks in this section.</div>';
    return;
  }

  filtered.forEach(function(task) {
    let buttonHtml = "";

    if (task.status === "completed") {
      buttonHtml = '<button class="green" disabled>Completed</button>';
    } else if (task.status === "running") {
      buttonHtml = '<button disabled>Running...</button>';
    } else {
      buttonHtml = '<button onclick="executeTask(\'' + task.id + '\', this)">Execute</button>';
    }

    const div = document.createElement("div");
    div.className = "task";

    div.innerHTML = `
      <div class="task-title">${escapeHtml(task.title || "")}</div>
      <div>${escapeHtml(task.description || "")}</div>

      <div class="status">Status: ${escapeHtml(task.status || "")}</div>

      <div class="badges">
        <span class="badge">Chairman</span>
        <span class="badge">CTO</span>
        <span class="badge">CMO</span>
        <span class="badge">HR</span>
        <span class="badge">Data Scientist</span>
        <span class="badge">Data Engineer</span>
        <span class="badge">ML Engineer</span>
        <span class="badge">Operations</span>
        <span class="badge">Security</span>
      </div>

      <button class="secondary" onclick="showTaskOutput('${task.id}')">View Details</button>
      ${buttonHtml}
    `;

    container.appendChild(div);
  });
}

function updateDashboard(tasks) {
  const total = tasks.length;
  const ongoing = tasks.filter(function(t) {
    return t.status !== "completed";
  }).length;
  const completed = tasks.filter(function(t) {
    return t.status === "completed";
  }).length;
  const latest = tasks[0] ? (tasks[0].title || "-") : "-";

  document.getElementById("totalTasks").innerText = total;
  document.getElementById("ongoingTasks").innerText = ongoing;
  document.getElementById("completedTasks").innerText = completed;
  document.getElementById("latestTask").innerText = latest.length > 12 ? latest.slice(0, 12) + "..." : latest;
}

function showTaskOutput(taskId) {
  const task = latestTasks.find(function(t) { return t.id === taskId; });
  if (!task) return;

  const structured = task.structured_output || {};
  const viewer = document.getElementById("selectedTaskViewer");

  viewer.innerHTML = `
    <div class="viewer-title">${escapeHtml(task.title || "")}</div>
    <div class="status">Status: ${escapeHtml(task.status || "")}</div>

    <div class="badges">
      <span class="badge">Chairman</span>
      <span class="badge">CTO</span>
      <span class="badge">CMO</span>
      <span class="badge">HR</span>
      <span class="badge">Data Scientist</span>
      <span class="badge">Data Engineer</span>
      <span class="badge">ML Engineer</span>
      <span class="badge">Operations</span>
      <span class="badge">Security</span>
      <span class="badge">Final Summary</span>
    </div>

    ${renderSection("Chairman", structured.chairman)}
    ${renderSection("CTO", structured.cto)}
    ${renderSection("CMO", structured.cmo)}
    ${renderSection("HR", structured.hr)}
    ${renderSection("Data Scientist", structured.data_scientist)}
    ${renderSection("Data Engineer", structured.data_engineer)}
    ${renderSection("ML Engineer", structured.ml_engineer)}
    ${renderSection("Operations", structured.operations)}
    ${renderSection("Security", structured.security)}
    ${renderSection("Final Summary", structured.final_summary)}

    <div class="viewer-box">
      <div class="section-title">Legacy Combined Output</div>
      <pre>${escapeHtml(task.final_output || "No output yet")}</pre>
    </div>
  `;
}

function renderSection(title, content) {
  return `
    <div class="section-card">
      <div class="section-title">${escapeHtml(title)}</div>
      <div>${escapeHtml(content || "No output yet")}</div>
    </div>
  `;
}

async function executeTask(id, btn) {
  btn.innerText = "Running...";
  btn.disabled = true;

  try {
    const res = await fetch(BACKEND + "/api/tasks/" + id + "/execute", {
      method: "POST"
    });

    const data = await res.json();
    if (!res.ok || data.ok === false) {
      alert(data.error || "Execution failed");
      btn.innerText = "Execute";
      btn.disabled = false;
      return;
    }

    setTimeout(function() {
      loadTasks();
    }, 1500);
  } catch (err) {
    alert("Execute Error: " + err.message);
    btn.innerText = "Execute";
    btn.disabled = false;
  }
}

function escapeHtml(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

loadTasks();
</script>

</body>
</html>
