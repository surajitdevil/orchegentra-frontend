<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orchegentra AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1020;
  color: white;
}

.header {
  padding: 15px;
  text-align: center;
  background: #141b34;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.card {
  background: #141b34;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, textarea, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #5a7cff;
  color: white;
  font-weight: bold;
}

.task {
  background: #0e1530;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

.status {
  font-size: 12px;
  color: #aaa;
}

.output-box {
  margin-top: 10px;
  background: black;
  padding: 10px;
  border-radius: 8px;
  max-height: 220px;
  overflow: auto;
}
</style>

</head>

<body>

<div class="header">
  ORCHEGENTRA AI — DASHBOARD
</div>

<div class="container">

  <div class="card">
    <h3>Create Task</h3>
    <input id="title" placeholder="Title">
    <textarea id="desc" placeholder="Description"></textarea>
    <button onclick="createTask()">Create Task</button>
  </div>

  <div class="card">
    <h3>Tasks</h3>
    <button onclick="loadTasks()">Refresh</button>
    <div id="tasks"></div>
  </div>

</div>

<script>
const BACKEND = "https://adventurous-art-production.up.railway.app";

// CREATE TASK
async function createTask(){
  try {
    const res = await fetch(BACKEND + "/api/tasks/create", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        title: document.getElementById("title").value,
        description: document.getElementById("desc").value
      })
    });

    const data = await res.json();
    alert("Task Created ✅");
    loadTasks();

  } catch (err) {
    alert("Error: " + err.message);
  }
}

// LOAD TASKS
async function loadTasks(){
  try {
    const res = await fetch(BACKEND + "/api/tasks");
    const data = await res.json();

    const container = document.getElementById("tasks");
    container.innerHTML = "";

    (data.data || []).forEach(task => {

      let button = "";

      if (task.status === "completed") {
        button = `<button disabled style="background:#2e8b57;">Completed</button>`;
      } else if (task.status === "running") {
        button = `<button disabled>Running...</button>`;
      } else {
        button = `<button onclick="executeTask('${task.id}', this)">Execute</button>`;
      }

      container.innerHTML += `
        <div class="task">
          <b>${task.title}</b><br>
          ${task.description}<br>

          <div class="status">
            Status: ${task.status}
          </div>

          ${button}

          <div class="output-box">
            <b>🧠 Agents Flow:</b><br>
            Chairman → Analyst → CTO → Builder → Security
            <hr style="border:0.5px solid #333">
            <pre>${task.final_output || "No output yet"}</pre>
          </div>
        </div>
      `;
    });

  } catch (err) {
    alert("Load Error: " + err.message);
  }
}

// EXECUTE TASK
async function executeTask(id, btn){
  btn.innerText = "Running...";
  btn.disabled = true;

  try {
    await fetch(BACKEND + "/api/tasks/" + id + "/execute", {
      method: "POST"
    });

    setTimeout(() => {
      loadTasks();
    }, 1500);

  } catch (err) {
    alert("Execute Error: " + err.message);
  }
}
</script>

</body>
</html>
