<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orchegentra AI</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { background:#0b1020; color:white; font-family:Arial; padding:20px }
.card { background:#141b34; padding:16px; border-radius:16px; margin-bottom:16px }
input,textarea,button { width:100%; padding:12px; margin-top:10px; border-radius:10px; border:none }
button { background:#5a7cff; color:white; font-weight:bold }
.task { background:#0e1530; padding:12px; margin-top:10px; border-radius:12px }
.output { white-space:pre-wrap; background:#000; padding:10px; border-radius:10px; margin-top:10px }
</style>
</head>

<body>

<div class="card">
<h2>Login / Signup</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<div id="status"></div>
</div>

<div class="card">
<h2>Create Task</h2>

<input id="title" placeholder="Title">
<textarea id="desc" placeholder="Description"></textarea>

<button onclick="createTask()">Create Task</button>
</div>

<div class="card">
<h2>Tasks</h2>

<button onclick="loadTasks()">Refresh</button>
<div id="tasks"></div>

</div>

<script>
const SUPABASE_URL = "https://etdbqqpmqfhzlsbvwm.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZGJxcXBtcWZoemxzYnZ3bW51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk4MzQsImV4cCI6MjA5MDcyNTgzNH0._u2OmAXIz65SZNLp-nfqbRYYFjZtYugXTYdRPeWG2BE";

const BACKEND = "https://adventurous-art-production.up.railway.app";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// SIGNUP
async function signup(){
  const { error } = await supabase.auth.signUp({
    email: email.value,
    password: password.value
  });
  status.innerText = error ? error.message : "Signup success";
}

// LOGIN
async function login(){
  const { error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });
  status.innerText = error ? error.message : "Login success";
}

// LOGOUT
async function logout(){
  await supabase.auth.signOut();
  status.innerText = "Logged out";
}

// GET TOKEN
async function getToken(){
  const { data } = await supabase.auth.getSession();
  return data.session?.access_token;
}

// CREATE TASK
async function createTask(){
  const token = await getToken();

  if(!token){
    alert("Login first");
    return;
  }

  const res = await fetch(BACKEND+"/api/tasks/create",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({
      title:title.value,
      description:desc.value
    })
  });

  const data = await res.json();
  alert(JSON.stringify(data));
}

// LOAD TASKS
async function loadTasks(){
  const token = await getToken();

  if(!token){
    alert("Login first");
    return;
  }

  const res = await fetch(BACKEND+"/api/tasks",{
    headers:{
      "Authorization":"Bearer "+token
    }
  });

  const data = await res.json();

  tasks.innerHTML = "";

  (data.data || []).forEach(t=>{
    const div = document.createElement("div");
    div.className="task";

    div.innerHTML = `
      <b>${t.title}</b><br>
      ${t.description}<br>
      Status: ${t.status}<br>
      <button onclick="execute('${t.id}')">Execute</button>
      <div class="output">${t.final_output || ""}</div>
    `;

    tasks.appendChild(div);
  });
}

// EXECUTE TASK
async function execute(id){
  const token = await getToken();

  const res = await fetch(BACKEND+"/api/tasks/"+id+"/execute",{
    method:"POST",
    headers:{
      "Authorization":"Bearer "+token
    }
  });

  const data = await res.json();
  alert("Executed");
  loadTasks();
}
</script>

</body>
</html>
