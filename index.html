<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orchegentra AI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
  background: #0b1020;
  color: white;
  font-family: Arial, sans-serif;
  padding: 20px;
  margin: 0;
}
.card {
  background: #141b34;
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 16px;
}
input, textarea, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  box-sizing: border-box;
}
textarea {
  min-height: 110px;
  resize: vertical;
}
button {
  background: #5a7cff;
  color: white;
  font-weight: bold;
  cursor: pointer;
}
.task {
  background: #0e1530;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
}
.output {
  white-space: pre-wrap;
  background: #000;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}
#status {
  margin-top: 12px;
  padding: 10px;
  background: #0e1530;
  border-radius: 10px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="card">
  <h2>Login / Signup</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button type="button" onclick="signup()">Signup</button>
  <button type="button" onclick="login()">Login</button>
  <button type="button" onclick="logout()">Logout</button>

  <div id="status">Ready</div>
</div>

<div class="card">
  <h2>Create Task</h2>

  <input id="title" placeholder="Title">
  <textarea id="desc" placeholder="Description"></textarea>

  <button type="button" onclick="createTask()">Create Task</button>
</div>

<div class="card">
  <h2>Tasks</h2>

  <button type="button" onclick="loadTasks()">Refresh</button>
  <div id="tasks"></div>
</div>

<script>
const SUPABASE_URL = "https://etdbqqpmqfhzlsbvwm.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZGJxcXBtcWZoemxzYnZ3bW51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk4MzQsImV4cCI6MjA5MDcyNTgzNH0._u2OmAXIz65SZNLp-nfqbRYYFjZtYugXTYdRPeWG2BE";
const BACKEND = "https://adventurous-art-production.up.railway.app";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function el(id) {
  return document.getElementById(id);
}

function setStatus(msg) {
  el("status").innerText = msg;
}

async function signup() {
  try {
    const email = el("email").value.trim();
    const password = el("password").value;

    if (!email || !password) {
      alert("Enter email and password");
      setStatus("Enter email and password");
      return;
    }

    const { error } = await supabaseClient.auth.signUp({
      email,
      password
    });

    if (error) {
      alert(error.message);
      setStatus(error.message);
      return;
    }

    alert("Signup request sent successfully. Check your email if confirmation is required.");
    setStatus("Signup success. Check email if confirmation is required.");
  } catch (e) {
    alert(e.message);
    setStatus(e.message);
  }
}

async function login() {
  try {
    const email = el("email").value.trim();
    const password = el("password").value;

    if (!email || !password) {
      alert("Enter email and password");
      setStatus("Enter email and password");
      return;
    }

    const { error } = await supabaseClient.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      alert(error.message);
      setStatus(error.message);
      return;
    }

    alert("Login success");
    setStatus("Login success");
  } catch (e) {
    alert(e.message);
    setStatus(e.message);
  }
}

async function logout() {
  try {
    await supabaseClient.auth.signOut();
    alert("Logged out");
    setStatus("Logged out");
  } catch (e) {
    alert(e.message);
    setStatus(e.message);
  }
}

async function getToken() {
  const { data } = await supabaseClient.auth.getSession();
  return data.session?.access_token || "";
}

async function createTask() {
  try {
    const token = await getToken();

    if (!token) {
      alert("Login first");
      setStatus("Login first");
      return;
    }

    const title = el("title").value.trim();
    const description = el("desc").value.trim();

    if (!title) {
      alert("Enter task title");
      return;
    }

    const res = await fetch(BACKEND + "/api/tasks/create", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        title,
        description
      })
    });

    const data = await res.json();

    if (!res.ok || !data.ok) {
      alert(data.error || "Task create failed");
      return;
    }

    alert("Task created");
    setStatus("Task created: " + data.task.id);
  } catch (e) {
    alert(e.message);
    setStatus(e.message);
  }
}

async function loadTasks() {
  try {
    const token = await getToken();

    if (!token) {
      alert("Login first");
      setStatus("Login first");
      return;
    }

    const res = await fetch(BACKEND + "/api/tasks", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const data = await res.json();
    const root = el("tasks");
    root.innerHTML = "";

    if (!res.ok || !data.ok) {
      alert(data.error || "Load tasks failed");
      root.innerHTML = "<div class='output'>Load failed</div>";
      return;
    }

    (data.data || []).forEach(t => {
      const div = document.createElement("div");
      div.className = "task";

      div.innerHTML = `
        <b>${escapeHtml(t.title || "")}</b><br>
        ${escapeHtml(t.description || "")}<br>
        Status: ${escapeHtml(t.status || "")}<br>
        <button type="button" onclick="executeTask('${t.id}')">Execute</button>
        <div class="output">${escapeHtml(t.final_output || "")}</div>
      `;

      root.appendChild(div);
    });

    if ((data.data || []).length === 0) {
      root.innerHTML = "<div class='output'>No tasks found</div>";
    }
  } catch (e) {
    alert(e.message);
    setStatus(e.message);
  }
}

async function executeTask(id) {
  try {
    const token = await getToken();

    if (!token) {
      alert("Login first");
      setStatus("Login first");
      return;
    }

    const res = await fetch(BACKEND + "/api/tasks/" + id + "/execute", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const data = await res.json();

    if (!res.ok || !data.ok) {
      alert(data.error || "Execution failed");
      return;
    }

    alert("Executed");
    setStatus("Task executed");
    await loadTasks();
  } catch (e) {
    alert(e.message);
    setStatus(e.message);
  }
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
</script>

</body>
</html>
