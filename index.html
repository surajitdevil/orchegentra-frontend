<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orchegentra AI</title>

<style>
:root{
  --bg:#050b1a;
  --glass:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --blue:#5a7cff;
  --cyan:#33c6d8;
  --purple:#7d5cff;
  --green:#2e8b57;
  --text:#ffffff;
  --soft:#9db2d9;
}

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:
    radial-gradient(circle at 20% 10%, rgba(90,124,255,.25), transparent 30%),
    radial-gradient(circle at 80% 0%, rgba(51,198,216,.18), transparent 30%),
    var(--bg);
  color:var(--text);
}

/* MAIN GRID */
.app{
  display:grid;
  grid-template-columns:260px 1fr 420px;
  min-height:100vh;
}

/* GLASS PANEL */
.glass{
  background:var(--glass);
  backdrop-filter: blur(16px);
  border:1px solid var(--border);
  border-radius:18px;
}

/* SIDEBAR */
.sidebar{
  padding:16px;
  border-right:1px solid var(--border);
}

.logo{
  font-size:26px;
  font-weight:900;
  padding:14px;
  border-radius:16px;
  background:linear-gradient(135deg, rgba(90,124,255,.2), rgba(51,198,216,.15));
  box-shadow:0 0 30px rgba(90,124,255,.15);
}

.nav-btn{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:transparent;
  color:white;
  border:1px solid var(--border);
}

.nav-btn:hover{
  background:rgba(90,124,255,.15);
  box-shadow:0 0 20px rgba(90,124,255,.25);
}

/* MAIN */
.main{
  padding:16px;
}

/* TOP BAR */
.topbar{
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.status-pill{
  padding:6px 12px;
  border-radius:999px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05);
}

/* PANEL */
.panel{
  padding:16px;
  margin-top:16px;
}

/* INPUT */
.input, .textarea{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#2a2e35;
  color:white;
}

/* BUTTON */
.btn{
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:800;
  background:linear-gradient(90deg, #5a7cff, #7d5cff);
  color:white;
  transition:0.3s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 20px rgba(90,124,255,.6);
}

/* EXECUTE BUTTON PULSE */
.execute-btn{
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 rgba(90,124,255,0.7);}
  50%{box-shadow:0 0 20px rgba(90,124,255,1);}
  100%{box-shadow:0 0 0 rgba(90,124,255,0.7);}
}

/* TASK CARD */
.task{
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  background:rgba(10,20,50,.8);
  border:1px solid rgba(90,124,255,.2);
  box-shadow:0 0 20px rgba(0,0,0,.3);
}

/* AGENT CHIPS */
.chips{
  margin-top:10px;
}

.chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border-radius:999px;
  margin:4px;
  font-size:12px;
  background:rgba(90,124,255,.2);
}

/* LIVE DOT */
.dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:#33ff99;
  animation:blink 1.2s infinite;
}

@keyframes blink{
  0%{opacity:1}
  50%{opacity:0.3}
  100%{opacity:1}
}

/* RIGHT PANEL */
.right{
  padding:16px;
}

.viewer{
  height:calc(100vh - 32px);
  overflow:auto;
  padding:16px;
}

.section{
  margin-top:12px;
  padding:10px;
  border-radius:12px;
  background:#0a1328;
}

/* MOBILE */
@media(max-width:1000px){
  .app{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">ORCHEGENTRA</div>

  <button class="nav-btn">Dashboard</button>
  <button class="nav-btn">Workspace</button>
  <button class="nav-btn">Agents</button>
  <button class="nav-btn">Intelligence</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar glass">
    <div>AI Command Center</div>
    <div class="status-pill">System Active</div>
  </div>

  <div class="panel glass">
    <h3>Create Task</h3>
    <input id="title" class="input" placeholder="Task Title">
    <textarea id="desc" class="textarea" placeholder="Task Description"></textarea>
    <button class="btn" onclick="createTask()">Create Task</button>
  </div>

  <div class="panel glass">
    <h3>Tasks</h3>
    <button class="btn" onclick="loadTasks()">Refresh</button>
    <div id="tasks"></div>
  </div>

</div>

<!-- RIGHT -->
<div class="right">
  <div class="viewer glass" id="viewer">
    Select a task to view output
  </div>
</div>

</div>

<script>
const BACKEND = "https://adventurous-art-production.up.railway.app";

async function createTask(){
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;

  const res = await fetch(BACKEND+"/api/tasks/create",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({title,description:desc})
  });

  alert("Task Created");
  loadTasks();
}

async function loadTasks(){
  const res = await fetch(BACKEND+"/api/tasks");
  const data = await res.json();

  let html="";
  data.data.forEach(t=>{
    html+=`
    <div class="task">
      <b>${t.title}</b><br>
      ${t.description}<br>

      <div class="chips">
        <span class="chip"><span class="dot"></span>Chairman</span>
        <span class="chip"><span class="dot"></span>CTO</span>
        <span class="chip"><span class="dot"></span>CMO</span>
        <span class="chip"><span class="dot"></span>HR</span>
        <span class="chip"><span class="dot"></span>ML</span>
      </div>

      <button class="btn execute-btn" onclick="executeTask('${t.id}')">Execute</button>
      <button class="btn" onclick="viewTask('${t.id}')">View</button>
    </div>
    `;
  });

  document.getElementById("tasks").innerHTML=html;
}

async function executeTask(id){
  await fetch(BACKEND+"/api/tasks/"+id+"/execute",{method:"POST"});
  loadTasks();
}

function viewTask(id){
  document.getElementById("viewer").innerHTML="Loading AI Output...";
}

loadTasks();
</script>

</body>
</html>
