<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ORCHEGENTRA AI — Frontend</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #00f5ff;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    input, textarea, button {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #00f5ff;
      color: black;
      font-weight: bold;
    }

    .task {
      background: #111827;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>ORCHEGENTRA AI</h1>

<div class="container">

  <input id="backendUrl" placeholder="Backend URL" value="https://adventurous-art-production.up.railway.app" />

  <input id="title" placeholder="Task Title" />
  <textarea id="desc" placeholder="Task Description"></textarea>

  <button onclick="createTask()">Create Task</button>
  <button onclick="loadTasks()">Load Tasks</button>

  <div id="tasks"></div>

</div>

<script>
  function getBase() {
    return document.getElementById("backendUrl").value;
  }

  async function createTask() {
    const title = document.getElementById("title").value;
    const description = document.getElementById("desc").value;

    const res = await fetch(getBase() + "/api/tasks/create", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, description })
    });

    const data = await res.json();
    alert("Task Created: " + data.task.id);
  }

  async function executeTask(id) {
    const res = await fetch(getBase() + "/api/tasks/" + id + "/execute", {
      method: "POST"
    });

    const data = await res.json();
    alert("Result:\n" + data.result);
  }

  async function loadTasks() {
    const res = await fetch(getBase() + "/api/tasks");
    const data = await res.json();

    const container = document.getElementById("tasks");
    container.innerHTML = "";

    data.data.forEach(task => {
      const div = document.createElement("div");
      div.className = "task";

      div.innerHTML = `
        <b>${task.title}</b><br/>
        ${task.description}<br/>
        Status: ${task.status}<br/>
        <button onclick="executeTask('${task.id}')">Execute</button>
      `;

      container.appendChild(div);
    });
  }
</script>

</body>
</html>
