<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orchegentra AI</title>

<style>
body { margin:0; font-family:Arial; background:#0b1020; color:white }
.header { padding:15px; background:#141b34; text-align:center; font-weight:bold }
.container { padding:15px }
.card { background:#141b34; padding:15px; border-radius:12px; margin-bottom:15px }
input, textarea, button {
  width:100%; padding:10px; margin-top:10px; border-radius:8px; border:none;
}
button { background:#5a7cff; color:white; font-weight:bold }
.task { background:#0e1530; padding:10px; border-radius:10px; margin-top:10px }
.status { font-size:12px; color:#aaa; margin-top:5px }
</style>
</head>

<body>

<div class="header">ORCHEGENTRA AI</div>

<div class="container">

<div class="card">
<h3>Create Task</h3>
<input id="title" placeholder="Task Title">
<textarea id="desc" placeholder="Task Description"></textarea>
<button onclick="createTask()">Create Task</button>
</div>

<div class="card">
<h3>Tasks</h3>
<button onclick="loadTasks()">Refresh</button>
<div id="tasks"></div>
</div>

</div>

<script>
const BACKEND = "https://adventurous-art-production.up.railway.app";

async function createTask(){
  const res = await fetch(BACKEND+"/api/tasks/create",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      title: document.getElementById("title").value,
      description: document.getElementById("desc").value
    })
  });

  const data = await res.json();
  alert("Task Created");
}

async function loadTasks(){
  const res = await fetch(BACKEND+"/api/tasks");
  const data = await res.json();

  const container = document.getElementById("tasks");
  container.innerHTML = "";

  (data.data || []).forEach(task => {
    const div = document.createElement("div");
    div.className = "task";

    div.innerHTML = `
      <b>${task.title}</b><br>
      ${task.description}<br>
      <div class="status">Status: ${task.status}</div>
      <button onclick="executeTask('${task.id}')">Execute</button>
      <div class="status">${task.final_output || ""}</div>
    `;

    container.appendChild(div);
  });
}

async function executeTask(id){
  await fetch(BACKEND+"/api/tasks/"+id+"/execute",{
    method:"POST"
  });

  alert("Executed");
  loadTasks();
}
</script>

</body>
</html>
